version: '3'

vars:
  BINARY_NAME: gitlab_auto_mr
  BUILD_DIR: ./build
  MAIN_PACKAGE: .

tasks:
  default:
    cmds:
      - task: build

  deps:
    desc: Download Go modules
    cmds:
      - go mod download
      - go mod tidy

  deps-verify:
    desc: Verify Go dependencies
    cmds:
      - go mod verify
      - |
        if ! go mod tidy -diff; then
          echo "go.mod or go.sum needs tidying. Run 'task deps' to fix."
          exit 1
        fi

  setup-hooks:
    desc: Install pre-commit hooks
    cmds:
      - |
        if command -v pre-commit >/dev/null 2>&1; then
          pre-commit install
          pre-commit install --hook-type pre-push
          echo "Pre-commit hooks installed successfully"
        else
          echo "pre-commit not found. Install it with: pip install pre-commit"
          exit 1
        fi

  build:
    desc: Build the application
    deps: [deps]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -o {{.BUILD_DIR}}/{{.BINARY_NAME}} {{.MAIN_PACKAGE}}

  build-all:
    desc: Build for all platforms
    deps: [deps]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-amd64 {{.MAIN_PACKAGE}}
      - GOOS=linux GOARCH=arm64 go build -ldflags="-w -s" -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-linux-arm64 {{.MAIN_PACKAGE}}
      - GOOS=windows GOARCH=amd64 go build -ldflags="-w -s" -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-windows-amd64.exe {{.MAIN_PACKAGE}}
      - GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s" -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-amd64 {{.MAIN_PACKAGE}}
      - GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s" -o {{.BUILD_DIR}}/{{.BINARY_NAME}}-darwin-arm64 {{.MAIN_PACKAGE}}

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - go tool cover -func=coverage.out

  lint:
    desc: Run linters
    cmds:
      - go vet ./...
      - |
        if [ -n "$(gofmt -l .)" ]; then
          echo "Code not formatted properly. Run 'task fmt' to fix."
          echo "Files that need formatting:"
          gofmt -l .
          exit 1
        fi

  fmt:
    desc: Format code
    cmds:
      - gofmt -w .

  run:
    desc: Run the application
    deps: [build]
    cmds:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}} {{.CLI_ARGS}}"
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  install:
    desc: Install the application
    deps: [deps]
    cmds:
      - go install {{.MAIN_PACKAGE}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}
      - rm -f coverage.out coverage.html

  docker-build:
    desc: Build Docker image
    cmds:
      - docker build -t gitlab-auto-mr:latest .

  docker-run:
    desc: Run Docker container
    deps: [docker-build]
    cmds:
      - docker run --rm gitlab-auto-mr:latest {{.CLI_ARGS}}
    vars:
      CLI_ARGS: '{{default "" .CLI_ARGS}}'

  pre-commit:
    desc: Run pre-commit checks
    cmds:
      - task: fmt
      - task: lint
      - task: test

  ci:
    desc: Run CI pipeline
    cmds:
      - task: deps
      - task: lint
      - task: test
      - task: build-all

  help:
    desc: Show available tasks
    cmds:
      - task --list