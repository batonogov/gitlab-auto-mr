stages:
  - test
  - build
  - docker
  - release

variables:
  GO_VERSION: "1.21"
  BINARY_NAME: "gitlab_auto_mr"

# Test stage
test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git
    - go mod download
  script:
    - go vet ./...
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.out
      - coverage.xml
    expire_in: 1 week
  coverage: '/total:.*?(\d+\.\d+)%/'

lint:
  stage: test
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git
  script:
    - go mod download
    - go fmt -l .
    - test -z "$(go fmt -l .)" || (echo "Code not formatted properly" && exit 1)
    - go vet ./...

# Build stage
build:linux:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git
  script:
    - mkdir -p build
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o build/${BINARY_NAME}-linux-amd64 .
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-w -s" -o build/${BINARY_NAME}-linux-arm64 .
  artifacts:
    paths:
      - build/
    expire_in: 1 week

build:windows:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git
  script:
    - mkdir -p build
    - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-w -s" -o build/${BINARY_NAME}-windows-amd64.exe .
  artifacts:
    paths:
      - build/
    expire_in: 1 week

build:darwin:
  stage: build
  image: golang:${GO_VERSION}-alpine
  before_script:
    - apk add --no-cache git
  script:
    - mkdir -p build
    - CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags="-w -s" -o build/${BINARY_NAME}-darwin-amd64 .
    - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags="-w -s" -o build/${BINARY_NAME}-darwin-arm64 .
  artifacts:
    paths:
      - build/
    expire_in: 1 week

# Docker stage
docker:build:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Release stage
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build:linux
      artifacts: true
    - job: build:windows
      artifacts: true
    - job: build:darwin
      artifacts: true
  script:
    - echo "Creating release"
  release:
    tag_name: $CI_COMMIT_TAG
    name: 'Release $CI_COMMIT_TAG'
    description: 'Release $CI_COMMIT_TAG'
    assets:
      links:
        - name: '${BINARY_NAME}-linux-amd64'
          url: '${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build/${BINARY_NAME}-linux-amd64'
        - name: '${BINARY_NAME}-linux-arm64'
          url: '${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build/${BINARY_NAME}-linux-arm64'
        - name: '${BINARY_NAME}-windows-amd64.exe'
          url: '${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build/${BINARY_NAME}-windows-amd64.exe'
        - name: '${BINARY_NAME}-darwin-amd64'
          url: '${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build/${BINARY_NAME}-darwin-amd64'
        - name: '${BINARY_NAME}-darwin-arm64'
          url: '${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/build/${BINARY_NAME}-darwin-arm64'
  rules:
    - if: $CI_COMMIT_TAG

# Example usage job - demonstrates the tool in action
demo:create_mr:
  stage: release
  image: $CI_REGISTRY_IMAGE:latest
  script:
    - |
      gitlab_auto_mr \
        --source-branch $CI_COMMIT_REF_NAME \
        --target-branch main \
        --title "Automated MR from $CI_COMMIT_REF_NAME" \
        --description .gitlab/merge_request_templates/default.md \
        --commit-prefix "Auto" \
        --mr-exists
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "push"
  allow_failure: true