A Docker image will be automatically built and published for this PR with tag \`pr-${PR_NUM}\`.

You can find the exact command in the Docker workflow run or check the GitHub Container Registry.

🤖 This PR was automatically created and updated by GitHub Actions.
📅 Last updated: ${CURRENT_DATE}"

            # Update PR body
            gh pr edit $PR_NUM --body "$PR_BODY"
          else
            echo "🆕 Creating new PR for branch ${{ github.ref_name }}"

            # Get current date for the body
            CURRENT_DATE=$(date '+%Y-%m-%d %H:%M:%S UTC')

            # Create initial PR body
            INITIAL_PR_BODY="## 🔄 Auto-Generated Pull Request

