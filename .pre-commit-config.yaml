repos:
  - repo: local
    hooks:
      - id: go-deps
        name: Verify Go dependencies
        entry: task deps-verify
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: go-fmt
        name: Format Go code
        entry: task fmt
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: go-lint
        name: Run Go linters
        entry: task lint
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: go-test
        name: Run Go tests
        entry: task test
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: go-build
        name: Verify Go build
        entry: task build
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]

      - id: taskfile-validation
        name: Validate Taskfile syntax
        entry: task --dry --list-all
        language: system
        files: ^Taskfile\.yml$
        pass_filenames: false
        stages: [pre-commit]

      - id: dockerfile-validation
        name: Validate Dockerfile syntax
        entry: sh -c 'if command -v hadolint >/dev/null 2>&1; then hadolint Dockerfile; else echo "Dockerfile syntax check skipped (hadolint not installed)"; fi'
        language: system
        files: ^Dockerfile$
        pass_filenames: false
        stages: [pre-commit]